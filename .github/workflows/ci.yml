name: Frontend CI

on:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Show repository
        run: |
          pwd
          ls -la
          git status
          git rev-parse HEAD

      - name: Check package-lock
        run: |
          grep lockfileVersion package-lock.json
          grep "@testing-library/dom" package-lock.json
          grep "@testing-library/react" package-lock.json

      - name: Install
        run: npm ci
